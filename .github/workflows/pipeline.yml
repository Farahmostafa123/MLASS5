name: ML Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare data (generate Iris dataset locally)
        run: |
          mkdir -p data
          python - <<'EOF'
          from sklearn.datasets import load_iris
          import csv
          X, y = load_iris(return_X_y=True)
          with open("data/iris.csv", "w", newline="") as f:
              writer = csv.writer(f)
              writer.writerow(["s1","s2","s3","s4","label"])
              for xi, yi in zip(X, y):
                  writer.writerow(list(xi) + [yi])
          print(f"Data ready: {len(y)} rows")
          EOF

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python train.py

      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check accuracy threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python check_threshold.py

      - name: Mock Docker Build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"